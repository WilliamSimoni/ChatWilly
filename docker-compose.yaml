version: "3.9"

services:

  redis:
    image: redis:7-alpine
    container_name: chatwilly_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: chatwilly_backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      CONFIG_PATH: /app/config.yaml
      ENV_PATH: /app/.env
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app 
    restart: unless-stopped

volumes:
  redis_data: